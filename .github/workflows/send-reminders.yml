name: Send daily reminders

on:
  schedule:
    - cron: '0 4 * * 1-6'  # 12PM PHT = 4AM UTC, Monday-Saturday
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send session reminders
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"type":"session"}' \
            ${{ secrets.APP_URL }}/api/messages/cron

      - name: Send document reminders
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{"type":"document"}' \
            ${{ secrets.APP_URL }}/api/messages/cron
